name: iOS — TestFlight build

# Builds the GroundLog iOS app on a macOS runner, signs with Fastlane Match,
# and uploads to TestFlight. Manual trigger only (workflow_dispatch).
#
# Cadence: every change deploys to web first via deploy.yml on push to main.
# After Tim verifies the change on app.groundlog.io, this workflow is
# triggered manually for the iOS build. Avoids speculative macOS minute
# spend (~10× the cost of Linux minutes) on builds we'd cancel anyway when
# fixing an issue caught in web testing.
#
# Push-on-main auto-trigger was tried 2026-05-05 → 2026-05-07 but did the
# wrong thing: every web fix push burned a macOS build cycle that
# cancel-in-progress would kill. Reverted to manual-only 2026-05-07.
#
# To rebuild for TestFlight: GitHub → Actions → "iOS — TestFlight build"
# → "Run workflow" → main → optional changelog string → Run.
#
# Build number = GitHub Actions run number (auto-increments per run).
# Marketing version = MARKETING_VERSION in App.xcodeproj (currently "1.0").

on:
  workflow_dispatch:
    inputs:
      changelog:
        description: "TestFlight changelog (what testers see for this build)"
        required: false
        default: "Automated build"
        type: string

concurrency:
  group: ios-build
  # If a new commit lands while a build is running, cancel the in-flight
  # build and start fresh on the latest. Saves macOS minutes on rapid
  # iteration. Manual workflow_dispatch runs are also subject to this.
  cancel-in-progress: true

jobs:
  build:
    name: Build IPA + upload to TestFlight
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          # Capacitor 8 CLI requires Node >=22 (per cap sync error 2026-05-05).
          # Other workflows (deploy.yml, dependency-watch.yml) stay on 20 since
          # they don't invoke @capacitor/cli.
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build web bundle
        env:
          # Baked into the JS bundle for runtime error capture (iOS WebView + web)
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          # Build-time only — used by @sentry/vite-plugin for source map upload.
          # GITHUB_RUN_NUMBER is auto-set by Actions; Vite plugin reads it
          # to tag the Sentry release matching the TestFlight build number.
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Select Xcode 26 (Apple now requires iOS 26 SDK for App Store uploads)
        # Apple enforces a minimum SDK version annually. As of 2026-04, all
        # uploads to App Store Connect must be built with Xcode 26+ (iOS 26 SDK).
        # macos-latest has multiple Xcodes installed but defaults to 16.4 —
        # this action picks the latest stable available on the runner.
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Ruby + Bundler cache
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: ios

      - name: Compute Match git basic auth header
        run: |
          AUTH=$(printf "%s" "x-access-token:${{ secrets.MATCH_GIT_PAT }}" | base64 | tr -d '\n')
          echo "MATCH_GIT_BASIC_AUTHORIZATION=$AUTH" >> "$GITHUB_ENV"

      - name: Build and upload to TestFlight
        working-directory: ios
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          BUILD_NUMBER: ${{ github.run_number }}
          CHANGELOG: ${{ inputs.changelog }}
          # Fastlane's `xcodebuild -showBuildSettings` retry default is 4 attempts
          # at 3s/6s/12s/24s. Xcode 26 on macos-latest sometimes exceeds this on
          # cold runners (build #11 timed out 2026-05-06). Bumping to 60s prevents
          # the transient flake without affecting successful runs.
          FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: "60"
        run: bundle exec fastlane beta

      - name: Upload IPA artifact (debug aid)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: GroundLog-${{ github.run_number }}.ipa
          path: ios/build/GroundLog.ipa
          if-no-files-found: warn
          retention-days: 14
